<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Actividades</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.css" rel="stylesheet">

  <!-- CSS personalizado -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Encabezado -->
  <header class="header">
    <div class="header-content">
      <h1 class="header-title">
        <span class="header-icon">&#128203;</span>
        Gestor de Actividades
      </h1>
      <p class="header-subtitle">Organiza tu dia de forma eficiente</p>
      <nav class="nav-links" style="margin-top:1rem;">
        <a href="/" class="nav-link active">&#128203; Actividades</a>
        <a href="/blog.html" class="nav-link">&#128221; Blog</a>
      </nav>
    </div>
  </header>

  <main class="container">

    <!-- Dashboard -->
    <section class="dashboard" id="dashboard">
      <div class="stat-card stat-total">
        <div class="stat-icon">&#128202;</div>
        <div class="stat-info">
          <span class="stat-number" id="stat-total">0</span>
          <span class="stat-label">Total</span>
        </div>
      </div>
      <div class="stat-card stat-pendientes">
        <div class="stat-icon">&#9203;</div>
        <div class="stat-info">
          <span class="stat-number" id="stat-pendientes">0</span>
          <span class="stat-label">Pendientes</span>
        </div>
      </div>
      <div class="stat-card stat-completadas">
        <div class="stat-icon">&#9989;</div>
        <div class="stat-info">
          <span class="stat-number" id="stat-completadas">0</span>
          <span class="stat-label">Completadas</span>
        </div>
      </div>
    </section>

    <!-- Layout principal: formulario + lista -->
    <div class="main-layout">

      <!-- Panel izquierdo: Formulario -->
      <section class="panel form-panel">
        <h2 class="panel-title" id="form-title">Nueva Actividad</h2>
        <form id="activity-form" class="activity-form" novalidate>
          <input type="hidden" id="activity-id">

          <div class="form-group">
            <label for="activity-titulo">Título <span class="required">*</span></label>
            <input type="text" id="activity-titulo" placeholder="Ej: Reunión de trabajo" required>
            <span class="error-msg" id="error-titulo"></span>
          </div>

          <div class="form-group">
            <label for="activity-descripcion">Descripción</label>
            <textarea id="activity-descripcion" rows="3" placeholder="Detalles de la actividad..."></textarea>
          </div>

          <div class="form-group">
            <label for="activity-fecha">Fecha <span class="required">*</span></label>
            <input type="date" id="activity-fecha" required>
            <span class="error-msg" id="error-fecha"></span>
          </div>

          <div class="form-group">
            <label for="activity-estado">Estado</label>
            <select id="activity-estado">
              <option value="Pendiente">Pendiente</option>
              <option value="Completada">Completada</option>
            </select>
          </div>

          <div class="form-buttons">
            <button type="submit" class="btn btn-primary" id="btn-guardar">Guardar</button>
            <button type="button" class="btn btn-secondary" id="btn-cancelar" style="display:none;">Cancelar</button>
          </div>
        </form>
      </section>

      <!-- Panel derecho: Lista de actividades -->
      <section class="panel list-panel">
        <div class="list-header">
          <h2 class="panel-title">Actividades</h2>
          <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="Todas">Todas</button>
            <button class="filter-btn" data-filter="Pendiente">Pendientes</button>
            <button class="filter-btn" data-filter="Completada">Completadas</button>
          </div>
        </div>

        <!-- Sin actividades -->
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">&#128221;</div>
          <p>No hay actividades aún. ¡Crea la primera!</p>
        </div>

        <!-- Lista de tarjetas -->
        <div class="activities-list" id="activities-list"></div>
      </section>

    </div>

    <!-- Calendario -->
    <section class="panel calendar-panel">
      <h2 class="panel-title">Calendario de Actividades</h2>
      <div id="calendar"></div>
    </section>

  </main>

  <!-- Modal de detalle de actividad -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <button class="modal-close" id="modal-close">&times;</button>
      <h3 class="modal-title" id="modal-title"></h3>
      <div class="modal-body">
        <p><strong>Descripción:</strong> <span id="modal-descripcion"></span></p>
        <p><strong>Fecha:</strong> <span id="modal-fecha"></span></p>
        <p><strong>Estado:</strong> <span id="modal-estado"></span></p>
      </div>
    </div>
  </div>

  <!-- Notificación toast -->
  <div class="toast-container" id="toast-container"></div>

  <!-- FullCalendar JS -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>

  <!-- Scripts del frontend -->
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
